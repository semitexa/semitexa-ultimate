# Minimal Semitexa app: PHP + Swoole in Docker.
# Start: bin/semitexa server:start | Stop: bin/semitexa server:stop
# Optional services are added automatically by bin/semitexa based on .env:
#   DB_DRIVER=mysql → docker-compose.mysql.yml
#   REDIS_HOST set  → docker-compose.redis.yml
#   EVENTS_ASYNC=1  → docker-compose.rabbitmq.yml
services:
  app:
    build: .
    env_file: .env
    volumes:
      - .:/var/www/html
    ports:
      - "${SWOOLE_PORT:-8080}:${SWOOLE_PORT:-8080}"
    restart: unless-stopped
    command: ["php", "server.php"]
    depends_on:
      setup:
        condition: service_completed_successfully

  setup:
    build: .
    env_file: .env
    volumes:
      - .:/var/www/html
    working_dir: /var/www/html
    command: ["sh", "/var/www/html/scripts/bootstrap-project.sh"]
    restart: "no"

  cli:
    build: .
    env_file: .env
    volumes:
      - .:/var/www/html
    working_dir: /var/www/html
    command: ["sleep", "infinity"]
    profiles: ["cli"]
    depends_on:
      setup:
        condition: service_completed_successfully
