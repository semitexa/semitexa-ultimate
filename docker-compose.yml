# Minimal Semitexa app: PHP + Swoole in Docker.
# Start: bin/semitexa server:start | Stop: bin/semitexa server:stop
# Optional services are added automatically by bin/semitexa based on .env.default/.env:
#   DB_DRIVER=mysql → docker-compose.mysql.yml
#   REDIS_HOST set  → docker-compose.redis.yml
#   EVENTS_ASYNC=1  → docker-compose.rabbitmq.yml
services:
  app:
    build: .
    env_file:
      - path: .env.default
        required: true
      - path: .env
        required: false
    volumes:
      - .:/var/www/html
    ports:
      - "${SWOOLE_PORT:-8080}:${SWOOLE_PORT:-8080}"
    restart: unless-stopped
    command: ["php", "server.php"]
    depends_on:
      setup:
        condition: service_completed_successfully

  scheduler:
    build: .
    env_file:
      - path: .env.default
        required: true
      - path: .env
        required: false
    volumes:
      - .:/var/www/html
    restart: unless-stopped
    profiles: ["demo"]
    command:
      - sh
      - -lc
      - |
        failure_count=0
        max_failures=5
        while true; do
          if php vendor/bin/semitexa demo:deferred-heartbeat >/dev/null; then
            failure_count=0
          else
            failure_count=$$((failure_count + 1))
            echo "scheduler heartbeat command failed ($$failure_count/$$max_failures)" >&2
            if [ "$$failure_count" -ge "$$max_failures" ]; then
              echo "scheduler heartbeat command failed $$max_failures times consecutively; exiting" >&2
              exit 1
            fi
          fi
          sleep 60
        done
    depends_on:
      setup:
        condition: service_completed_successfully

  setup:
    build: .
    user: root
    env_file:
      - path: .env.default
        required: true
      - path: .env
        required: false
    volumes:
      - .:/var/www/html
    working_dir: /var/www/html
    command: ["sh", "/var/www/html/scripts/bootstrap-project.sh"]
    restart: "no"

  cli:
    build: .
    env_file:
      - path: .env.default
        required: true
      - path: .env
        required: false
    volumes:
      - .:/var/www/html
    working_dir: /var/www/html
    command: ["sleep", "infinity"]
    profiles: ["cli"]
    depends_on:
      setup:
        condition: service_completed_successfully
