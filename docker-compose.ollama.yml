# Optional: Ollama local LLM runtime. server:start enables this overlay automatically when LLM_PROVIDER=ollama.
# Start manually: docker compose -f docker-compose.yml -f docker-compose.ollama.yml up -d
#
# After first start, pull a model inside the container:
#   docker compose exec ollama ollama pull gemma3:4b

services:
  app:
    environment:
      LLM_BASE_URL: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy

  ollama:
    image: ollama/ollama:0.5.7
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  ollama_data:
