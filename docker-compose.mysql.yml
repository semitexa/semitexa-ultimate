# Optional: MySQL for ORM. Used automatically when DB_DRIVER is set in .env.default/.env.
# Start: docker compose -f docker-compose.yml -f docker-compose.mysql.yml up -d
# Or: bin/semitexa server:start (uses this file automatically when DB_DRIVER is set).
services:
  app:
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
    depends_on:
      mysql:
        condition: service_healthy

  scheduler:
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    # Test suites + a running app stack share this instance; the 151 default
    # peaks out during full phpunit runs (observed Max_used_connections=152).
    command: ["mysqld", "--max-connections=500"]
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-semitexa}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  # FOOTGUN: this is a project-scoped Docker named volume (`<project>_mysql_data`).
  # It SURVIVES `rm -rf` of the project directory and is reused by any later
  # install whose dir name (compose project) matches — so a "fresh install" does
  # NOT reset the database. If a prior install initialised it with different
  # credentials, the app gets "Access denied" while the port still answers.
  # `bin/semitexa server:start` now verifies the configured user can actually
  # authenticate (not just that the port is open) and prints the reset command:
  #   docker volume rm <project>_mysql_data
  mysql_data:
